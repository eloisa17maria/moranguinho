<script>

        let n = prompt ("Quantos alunos tem na sua sala??")
        var vetor = []

        for (let i=0; i<n; i++) {
          
           let name = prompt ("Digite o nome de cada aluno:")
            vetor.push(name)
        } 
        alert ("Os alunos da sua sala são:" + vetor) 

</script>
